<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela de cadastro Categoria</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <h2 class="title">Cadastro de categoria</h2>

      <form id="categoriaForm" class="buttons-column">
        <input class="input" type="text" id="nomeCategoria" placeholder="Nome da categoria">
        <input class="input" type="text" id="descricaoCategoria" placeholder="Descrição da categoria">

        <div class="buttons-row">
          <button class="btn btn-blue" type="submit">Cadastrar</button>
          <button class="btn btn-blue" type="button" onclick="window.location.href='menu.html'">Voltar</button>
        </div>
      </form>
    </section>
  </main>

  <script src="js/cadastro-categoria.js"></script>
</body>
</html>
