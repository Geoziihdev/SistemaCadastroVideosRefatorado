<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela de cadastro vídeo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <h2 class="title">Cadastro de Vídeo</h2>

      <form id="videoForm" class="buttons-column">
        <input class="input" type="text" id="tituloVideo" placeholder="Título do vídeo">
        <input class="input" type="text" id="descricaoVideo" placeholder="Descrição">
        <input class="input" type="date" id="dataPublicacao">
        <input class="input" type="text" id="categoriaVideo" placeholder="Seleção de categoria">

        <div class="buttons-row">
          <button class="btn btn-blue" type="submit">Cadastrar</button>
          <button class="btn btn-blue" type="button" onclick="window.location.href='menu.html'">Voltar</button>
        </div>
      </form>
    </section>
  </main>

  <script src="js/cadastro-video.js"></script>
</body>
</html>
