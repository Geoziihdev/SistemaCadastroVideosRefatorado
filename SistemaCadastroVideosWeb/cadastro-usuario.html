<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela de cadastro usuário</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <h1 class="title-top">Bem-vindos ao Sistema de Cadastro de Vídeos</h1>
      <h2 class="title">Cadastro de usuário</h2>

      <form id="usuarioForm" class="buttons-column">
        <input class="input" type="text" id="emailUsuario" placeholder="Nome de usuário ou E-mail">
        <input class="input" type="password" id="senhaUsuario" placeholder="Crie uma senha">
        <input class="input" type="password" id="confirmarSenhaUsuario" placeholder="Confirme sua senha">

        <div style="display:flex; justify-content:center;">
          <button class="btn btn-blue" type="submit">Cadastrar</button>
        </div>
      </form>
    </section>
  </main>

  <script src="js/cadastro-usuario.js"></script>
</body>
</html>
