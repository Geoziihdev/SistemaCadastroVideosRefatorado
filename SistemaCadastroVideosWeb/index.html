<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela de login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <h1 class="title-top">Bem-vindos ao Sistema de Cadastro de Vídeos</h1>
      <h2 class="title">Entrar</h2>

      <form id="loginForm" class="buttons-column">
        <input class="input" type="text" id="email" placeholder="Nome de usuário ou E-mail">
        <input class="input" type="password" id="senha" placeholder="Senha">

        <div class="buttons-column" style="align-items:center;">
          <button class="btn btn-blue" type="submit">Entrar</button>
          <a class="link-text" href="cadastro-usuario.html">Cadastre-se</a>
        </div>
      </form>
    </section>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
