<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tela Lista de Vídeos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page">
    <section class="table-card">
      <h2 class="table-title">Lista de Vídeos</h2>

      <table class="table">
        <thead>
          <tr>
            <th>Título do vídeo</th>
            <th>Categoria</th>
            <th>Data de publicação</th>
          </tr>
        </thead>
        <tbody id="tabelaVideos"></tbody>
      </table>

      <div class="table-buttons">
        <button class="btn btn-blue" type="button" onclick="editarVideo()">Editar</button>
        <button class="btn btn-blue" type="button" onclick="window.location.href='menu.html'">Voltar</button>
        <button class="btn btn-red" type="button" onclick="excluirVideo()">Excluir</button>
      </div>
    </section>
  </main>

  <script src="js/lista-videos.js"></script>
</body>
</html>
